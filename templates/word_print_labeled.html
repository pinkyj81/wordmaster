<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>단어 출력(양식2)</title>
  <style>
    :root {
      --text: #0f172a;
      --muted: #475569;
      --line: #d8dee8;
      --line-strong: #b8c2d1;
      --head-bg: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 28px;
      font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
      color: var(--text);
      background: #f3f5f8;
    }

    .sheet {
      max-width: 1160px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e6ebf2;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 36px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .meta {
      margin-bottom: 18px;
      line-height: 1.7;
      font-size: 16px;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      overflow: hidden;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
      word-break: break-word;
      font-size: 16px;
    }

    th {
      background: var(--head-bg);
      font-weight: 600;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: #1f2937;
    }

    tbody tr:nth-child(even) {
      background: #fafcff;
    }

    .col-word {
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-weight: 500;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      padding-right: 12px;
    }

    .word-text {
      display: inline-block;
      max-width: 100%;
    }

    .col-index {
      width: 56px;
      min-width: 56px;
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 400;
      color: #334155;
    }

    .col-index-head {
      width: 56px;
      min-width: 56px;
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .col-meaning {
      font-size: 14px;
      line-height: 1.2;
      font-weight: 400;
      color: #334155;
    }

    .col-example {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 400;
      color: #334155;
    }

    .null {
      color: #94a3b8;
      font-style: italic;
    }

    .empty {
      padding: 30px;
      text-align: center;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid #9ca3af;
      background: #ffffff;
      color: #111827;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
    }

    @media print {
      body {
        padding: 0;
        background: #ffffff;
        font-family: "Pretendard Variable", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .sheet {
        max-width: none;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }

      th {
        background: var(--head-bg);
        font-weight: 700;
      }

      td {
        font-weight: 400;
      }

      .toolbar {
        display: none;
      }

      @page {
        margin: 14mm;
        size: A4;
      }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <h1>{{ text_title }}</h1>
    <div class="meta">
      <div><strong>출처:</strong> {{ source }}</div>
    </div>

    {% if words %}
    <table>
      <colgroup>
        <col style="width:56px;">
        <col style="width:34%;">
        <col style="width:28%;">
        <col style="width:38%;">
      </colgroup>
      <thead>
        <tr>
          <th class="col-index-head">순번</th>
          <th>단어</th>
          <th>뜻</th>
          <th>예문</th>
        </tr>
      </thead>
      <tbody>
        {% for w in words %}
        {% set ex = (w.example or '')|trim %}
        <tr>
          <td class="col-index">{{ loop.index }}</td>
          <td class="col-word"><span class="word-text">{{ w.word }}</span></td>
          <td class="col-meaning">{{ w.meaning }}</td>
          <td class="col-example{% if (not ex) or ex|lower == 'null' %} null{% endif %}">{{ ex if ex else 'NULL' }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="empty">출력할 단어가 없습니다.</div>
    {% endif %}

    <div class="toolbar">
      <button class="btn" onclick="window.print()">인쇄 / PDF 저장</button>
      <button class="btn" onclick="window.close()">창 닫기</button>
    </div>
  </div>

  <script>
    function fitWordText() {
      var minSize = 11;
      var maxSize = 24;
      var wordNodes = document.querySelectorAll('.col-word .word-text');

      wordNodes.forEach(function (node) {
        var parent = node.parentElement;
        var size = maxSize;
        node.style.fontSize = size + 'px';

        while (size > minSize && node.scrollWidth > parent.clientWidth - 2) {
          size -= 1;
          node.style.fontSize = size + 'px';
        }
      });
    }

    window.addEventListener('load', function () {
      fitWordText();
      setTimeout(function () {
        window.print();
      }, 250);
    });

    window.addEventListener('resize', fitWordText);
    window.addEventListener('beforeprint', fitWordText);
  </script>
</body>
</html>
